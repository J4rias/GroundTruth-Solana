version: '3.9'

# ── GroundTruth — Local Infrastructure ──────────────────────────────────────
# PostgreSQL and Redis run locally for development

services:
  postgres:
    image: postgres:16-alpine
    container_name: groundtruth_postgres
    environment:
      POSTGRES_USER: groundtruth
      POSTGRES_PASSWORD: groundtruth_password
      POSTGRES_DB: groundtruth
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U groundtruth']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: groundtruth_redis
    command: redis-server --requirepass redis_secret --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '--no-auth-warning',
          '-a',
          'redis_secret',
          'ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
