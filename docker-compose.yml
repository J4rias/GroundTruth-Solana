version: '3.9'

# ── GroundTruth — Local Infrastructure ──────────────────────────────────────
# PostgreSQL is hosted on Supabase — only Redis runs locally.

services:
  redis:
    image: redis:7-alpine
    container_name: groundtruth_redis
    command: redis-server --requirepass redis_secret --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '--no-auth-warning',
          '-a',
          'redis_secret',
          'ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis_data:
    driver: local
